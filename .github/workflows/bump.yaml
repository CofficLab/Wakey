name: Bump

on:
  push:
    branches:
      - pre
      - main

permissions:
  contents: write

env:
  tag: ${{ github.event.head_commit.id }}
  PROJECT: Wakey.xcodeproj
  SCHEME: Wakey

jobs:
  bump:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Calculate Next Version
        id: version
        run: |
          chmod +x .github/scripts/bump-version.sh
          chmod +x .github/scripts/calculate-version.sh

          # 获取当前版本
          LAST_TAG=$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || echo "v0.0.0")
          LAST_TAG="${LAST_TAG#v}"

          # 计算新版本
          NEW_VERSION=$(.github/scripts/calculate-version.sh)
          echo "new_version=$NEW_VERSION" >> $GITHUB_ENV
          echo "prev_version=$LAST_TAG" >> $GITHUB_ENV
          echo "New Version: $NEW_VERSION"

      - name: Update Xcode Project Version
        run: |
          # 更新 MARKETING_VERSION
          agvtool new-marketing-version ${{ env.new_version }} ||
          (
            # 如果上面失败，手动编辑项目文件
            sed -i '' "s/MARKETING_VERSION = [^;]*/MARKETING_VERSION = ${{ env.new_version }}/" ${{ env.PROJECT }}/project.pbxproj
          )

      - name: 更新构建号
        run: |
          # 更新 CURRENT_PROJECT_VERSION
          agvtool next-version -all

      - name: 生成标签（pre 分支）
        if: github.ref == 'refs/heads/pre'
        run: |
          build=$(agvtool what-version -terse | tail -n1 | cut -d= -f2 | xargs)
          echo "tag=p${{ env.new_version }}($build)" >> $GITHUB_ENV

      - name: 生成标签（main 分支）
        if: github.ref == 'refs/heads/main'
        run: |
          echo "tag=v${{ env.new_version }}" >> $GITHUB_ENV

      - name: 打标签并推送到仓库
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "ci: bump to ${{ env.new_version }}"
          commit_user_name: GitHub Action
          tagging_message: ${{ env.tag }}
          push_options: "--tags"
          branch: ${{ github.ref_name }}

      - name: 输出最终摘要
        if: always()
        run: |
          # 获取更新后的信息 - 使用 sed 提取等号后的内容，若无等号则保持原样
          NEW_M_VER=$(agvtool what-marketing-version -terse | tail -n1 | sed 's/.*=//' | xargs)
          NEW_B_VER=$(agvtool what-version -terse | tail -n1 | sed 's/.*=//' | xargs)

          echo "## ✅ 版本 Bump 完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 详情 |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **版本变化** | \`${{ env.prev_version }}\` → \`$NEW_M_VER\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **构建号** | \`$NEW_B_VER\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Git 标签** | \`${{ env.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **分支** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY


  rebase:
    if: github.ref == 'refs/heads/main'
    needs:
      - bump
    runs-on: ubuntu-latest
    steps:
      - name: 拉取 main 分支
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: 检查 pre 分支是否存在
        id: check_pre
        run: |
          if git ls-remote --heads origin pre | grep -q pre; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - name: 拉取 pre 分支
        if: steps.check_pre.outputs.exists == 'true'
        run: git fetch origin pre
      - name: Rebase pre on main
        continue-on-error: true
        if: steps.check_pre.outputs.exists == 'true'
        run: git rebase origin/main
      - name: Push the rebased pre branch
        continue-on-error: true
        if: steps.check_pre.outputs.exists == 'true'
        run: git push origin pre
