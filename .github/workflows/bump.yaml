name: Bump

on:
  push:
    branches:
      - pre
      - main

permissions:
  contents: write

env:
  tag: ${{ github.event.head_commit.id }}
  PROJECT: Wakey.xcodeproj
  SCHEME: Wakey

jobs:
  bump:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Calculate Next Version
        id: version
        run: |
          chmod +x .github/scripts/bump-version.sh
          chmod +x .github/scripts/calculate-version.sh

          # 获取当前版本
          LAST_TAG=$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || echo "v0.0.0")
          LAST_TAG="${LAST_TAG#v}"

          # 计算新版本
          NEW_VERSION=$(.github/scripts/calculate-version.sh)
          echo "new_version=$NEW_VERSION" >> $GITHUB_ENV
          echo "New Version: $NEW_VERSION"

          # 输出到 Summary
          echo "## 📊 版本计算" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **上一个版本**: \`$LAST_TAG\`" >> $GITHUB_STEP_SUMMARY
          echo "- **新版本**: \`$NEW_VERSION\`" >> $GITHUB_STEP_SUMMARY
          echo "- **分支**: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
      - name: Update Xcode Project Version
        run: |
          # 读取更新前的版本
          OLD_MARKETING_VERSION=$(agvtool what-marketing-version -terse)

          # 更新 MARKETING_VERSION
          agvtool new-marketing-version ${{ env.new_version }} ||
          (
            # 如果上面失败，手动编辑项目文件
            sed -i '' "s/MARKETING_VERSION = [^;]*/MARKETING_VERSION = ${{ env.new_version }}/" ${{ env.PROJECT }}/project.pbxproj
          )

          # 验证更新
          NEW_MARKETING_VERSION=$(agvtool what-marketing-version -terse)

          echo "## 📝 MARKETING_VERSION 更新" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 更新前 | \`$OLD_MARKETING_VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 更新后 | \`$NEW_MARKETING_VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 预期值 | \`${{ env.new_version }}\` |" >> $GITHUB_STEP_SUMMARY

          # 检查是否更新成功
          if [ "$NEW_MARKETING_VERSION" != "${{ env.new_version }}" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **警告**: MARKETING_VERSION 更新失败！" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "尝试手动修复..." >> $GITHUB_STEP_SUMMARY
            # 最后的手段：直接编辑文件
            sed -i '' "s/MARKETING_VERSION = [^;]*/MARKETING_VERSION = ${{ env.new_version }}/" ${{ env.PROJECT }}/project.pbxproj
            NEW_MARKETING_VERSION=$(agvtool what-marketing-version -terse)
            echo "| 手动修复后 | \`$NEW_MARKETING_VERSION\` |" >> $GITHUB_STEP_SUMMARY
          fi
      - name: 更新构建号
        run: |
          # 读取更新前的构建号
          OLD_BUILD_VERSION=$(agvtool what-version -terse)

          # 更新 CURRENT_PROJECT_VERSION
          agvtool next-version -all

          # 验证更新
          NEW_BUILD_VERSION=$(agvtool what-version -terse)

          echo "## 🔢 CURRENT_PROJECT_VERSION 更新" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 更新前 | \`$OLD_BUILD_VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 更新后 | \`$NEW_BUILD_VERSION\` |" >> $GITHUB_STEP_SUMMARY
      - name: 生成标签（pre 分支）
        if: github.ref == 'refs/heads/pre'
        run: |
          build=$(agvtool what-version -terse)
          echo "tag=p${{ env.new_version }}($build)" >> $GITHUB_ENV

          echo "## 🏷️ 生成标签（Pre-release）" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **标签**: \`p${{ env.new_version }}($build)\`" >> $GITHUB_STEP_SUMMARY
          echo "- **版本**: \`${{ env.new_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **构建号**: \`$build\`" >> $GITHUB_STEP_SUMMARY
      - name: 生成标签（main 分支）
        if: github.ref == 'refs/heads/main'
        run: |
          echo "tag=v${{ env.new_version }}" >> $GITHUB_ENV

          echo "## 🏷️ 生成标签（Release）" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **标签**: \`v${{ env.new_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **版本**: \`${{ env.new_version }}\`" >> $GITHUB_STEP_SUMMARY
      - name: 打标签并推送到仓库
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "ci: bump to ${{ env.new_version }}"
          commit_user_name: GitHub Action
          tagging_message: ${{ env.tag }}
          push_options: "--tags"
          branch: ${{ github.ref_name }}

      - name: 输出最终摘要
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## ✅ 版本 Bump 完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 新版本 | \`${{ env.new_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Git 标签 | \`${{ env.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 构建号 | \`$(agvtool what-version -terse)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Marketing Version | \`$(agvtool what-marketing-version -terse)\` |" >> $GITHUB_STEP_SUMMARY

  rebase:
    if: github.ref == 'refs/heads/main'
    needs:
      - bump
    runs-on: ubuntu-latest
    steps:
      - name: 拉取 main 分支
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: 检查 pre 分支是否存在
        id: check_pre
        run: |
          if git ls-remote --heads origin pre | grep -q pre; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
      - name: 拉取 pre 分支
        if: steps.check_pre.outputs.exists == 'true'
        run: git fetch origin pre
      - name: Rebase pre on main
        continue-on-error: true
        if: steps.check_pre.outputs.exists == 'true'
        run: git rebase origin/main
      - name: Push the rebased pre branch
        continue-on-error: true
        if: steps.check_pre.outputs.exists == 'true'
        run: git push origin pre
